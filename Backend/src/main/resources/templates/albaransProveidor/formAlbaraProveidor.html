<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Albarà Proveïdor - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <div th:replace="~{layout/sidebar :: sidebar('albaransProveidor')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Recepció</p>

                <h1 class="page-heading"
                    th:text="${albaraProveidor != null and albaraProveidor.id != null} ? 'Editar albarà de proveïdor' : 'Nou albarà de proveïdor'">
                </h1>

                <p class="page-description">
                    Registra la recepció i els lots associats.
                </p>
            </div>

            <div class="page-top-actions">
                <a th:href="@{/albarans-proveidor/ocr}" class="btn btn-primary">
                    <i class="bi bi-camera"></i>
                    OCR
                </a>

                <a th:href="@{/albarans-proveidor/list}" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i>
                    Tornar
                </a>
            </div>
        </section>

        <!----------------------- CONTINGUT ----------------------->
        <section class="content-card">

            <div class="content-toolbar">
                <div class="toolbar-block">
                    <h2 class="content-title">Dades de l'albarà</h2>
                    <p class="content-subtitle">Informació general de recepció</p>
                </div>

                <div th:if="${error}" class="form-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>
            </div>

            <div style="padding:20px 24px;">

                <form id="albaraProveidorForm"
                      th:action="${albaraProveidor.id != null} ? @{/albarans-proveidor/update/{id}(id=${albaraProveidor.id})} : @{/albarans-proveidor/save}"
                      th:object="${albaraProveidor}"
                      method="post">

                    <!----------------------- DADES ALBARÀ ----------------------->
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;">

                        <div class="form-group">
                            <label class="form-label">Data recepció</label>
                            <input id="dataRecepcio"
                                   type="datetime-local"
                                   name="dataRecepcio"
                                   th:value="${albaraProveidor.dataRecepcio != null} ? ${#temporals.format(albaraProveidor.dataRecepcio, 'yyyy-MM-dd''T''HH:mm')} : ''"
                                   class="form-input"
                                   required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Proveïdor</label>
                            <select id="proveidor"
                                    th:field="*{proveidor.id}"
                                    class="form-select"
                                    required>
                                <option value="">-- Selecciona --</option>
                                <option th:each="p : ${proveidors}"
                                        th:value="${p.id}"
                                        th:text="${p.nomProveidor}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Usuari receptor</label>
                            <select id="usuariReceptor"
                                    th:field="*{usuariReceptor.id}"
                                    class="form-select"
                                    required>
                                <option value="">-- Selecciona --</option>
                                <option th:each="u : ${usuaris}"
                                        th:value="${u.id}"
                                        th:text="${u.nomComplet}">
                                </option>
                            </select>
                        </div>

                    </div>

                    <!----------------------- LOTS ----------------------->
                    <div style="margin-top:30px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h2 class="content-title">Lots</h2>
                            <p class="content-subtitle">Lots inclosos en aquest albarà</p>
                        </div>

                        <button type="button" id="addLotBtn" class="btn btn-primary">
                            <i class="bi bi-plus-lg"></i>
                            Afegir lot
                        </button>
                    </div>

                    <div id="lotsContainer" style="margin-top:15px; display:flex; flex-direction:column; gap:15px;">

                        <div th:each="lot, stat : *{lots}"
                             class="lot-row"
                             style="padding:16px; border:1px solid #f0e6dc; border-radius:18px;">

                            <input type="hidden" th:field="*{lots[__${stat.index}__].id}">

                            <div style="display:grid; grid-template-columns:1.2fr 1fr 0.7fr 0.7fr auto; gap:15px; align-items:end;">

                                <!------ IDENTIFICADOR (READONLY) ------>
                                <div class="form-group">
                                    <label class="form-label">Identificador lot</label>
                                    <input type="text"
                                           class="form-input identificadorLotPreview"
                                           readonly>
                                </div>

                                <!------ MATÈRIA PRIMERA ------>
                                <div class="form-group">
                                    <label class="form-label">Matèria primera</label>
                                    <select th:field="*{lots[__${stat.index}__].materiaPrimera.id}"
                                            class="form-select materiaPrimeraInput"
                                            required>
                                        <option value="">-- Selecciona --</option>
                                        <option th:each="m : ${materiesPrimeres}"
                                                th:value="${m.id}"
                                                th:text="${m.nomMateria}">
                                        </option>
                                    </select>
                                </div>

                                <!------ QUANTITAT ------>
                                <div class="form-group">
                                    <label class="form-label">Quantitat</label>
                                    <input type="number"
                                           th:field="*{lots[__${stat.index}__].quantitat}"
                                           class="form-input quantitatInput"
                                           min="1"
                                           required>
                                </div>

                                <!------ UNITATS ------>
                                <div class="form-group">
                                    <label class="form-label">Unitats</label>
                                    <input type="text"
                                           th:field="*{lots[__${stat.index}__].unitats}"
                                           class="form-input unitatsInput"
                                           required>
                                </div>

                                <!------ ELIMINAR ------>
                                <button type="button" class="btn btn-secondary remove-lot-btn">
                                    <i class="bi bi-trash3"></i>
                                </button>

                            </div>

                        </div>

                    </div>

                    <!----------------------- BOTONS ----------------------->
                    <div style="margin-top:25px; display:flex; gap:10px;">
                        <button type="submit" class="btn btn-soft">
                            <i class="bi bi-save"></i> Guardar
                        </button>

                        <a th:href="@{/albarans-proveidor/list}" class="btn btn-secondary">
                            Cancel·lar
                        </a>
                    </div>

                </form>

            </div>

        </section>

    </main>

</div>

<script th:src="@{/js/albaransProveidor.js}"></script>

</body>
</html>
