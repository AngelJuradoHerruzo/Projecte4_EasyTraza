<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulari Matèria Primera - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar('materies')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">

                <!-- Secció -->
                <p class="page-eyebrow">Administració</p>

                <!-- Títol dinàmic -->
                <h1 class="page-heading"
                    th:text="${materiaPrimera.id != null} ? 'Editar matèria primera' : 'Nova matèria primera'">
                    Formulari
                </h1>

                <!-- Descripció -->
                <p class="page-description">
                    Introdueix o modifica les dades de la matèria primera.
                </p>
            </div>

            <!-- Botó tornar -->
            <div class="page-top-actions">
                <a th:if="${!popup}" th:href="@{/materies-primeres/list}" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i>
                    <span>Tornar</span>
                </a>
                <button th:if="${popup}" type="button" class="btn btn-primary" onclick="window.close();">
                    <i class="bi bi-x-lg"></i>
                    <span>Tancar</span>
                </button>
            </div>
        </section>

        <!----------------------- CONTENIDOR DEL FORMULARI ----------------------->
        <section class="content-card">

            <!----------------------- TOOLBAR SUPERIOR ----------------------->
            <div class="content-toolbar">

                <!-- Títol del formulari -->
                <div class="toolbar-block">
                    <h2 class="content-title">Dades de la matèria primera</h2>
                    <p class="content-subtitle">
                        Completa els camps següents.
                    </p>
                </div>

                <!-- Missatge d'error del backend -->
                <div th:if="${error}" class="form-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>
            </div>

            <!----------------------- COS DEL FORMULARI ----------------------->
            <div style="padding: 20px 24px;">

                <form id="materiaPrimeraForm"
                      th:action="${materiaPrimera.id != null} ? @{/materies-primeres/update/{id}(id=${materiaPrimera.id})} : @{/materies-primeres/save}"
                      th:object="${materiaPrimera}"
                      method="post">

                    <input type="hidden" name="popup" th:value="${popup != null and popup}">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start;">

                        <!-- Nom de la matèria primera -->
                        <div class="form-group">
                            <label class="form-label" for="nomMateria">Nom matèria</label>
                            <input id="nomMateria"
                                   type="text"
                                   th:field="*{nomMateria}"
                                   class="form-input"
                                   required
                                   title="Introdueix el nom de la matèria primera">
                        </div>

                        <!-- Descripció -->
                        <div class="form-group">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <label class="form-label" for="descripcio">Descripció</label>
                                <span id="descripcioCounter" style="font-size:13px;">0/50</span>
                            </div>

                            <input id="descripcio"
                                   type="text"
                                   th:field="*{descripcio}"
                                   class="form-input"
                                   title="La descripció és vàlida fins a 50 caràcters i admet un màxim d'entrada de 100">
                        </div>

                    </div>

                    <!----------------------- BOTONS D'ACCIÓ ----------------------->
                    <div style="margin-top: 25px; display: flex; gap: 10px;">

                        <!-- Guardar -->
                        <button type="submit" class="btn btn-soft">
                            <i class="bi bi-save"></i>
                            <span>Guardar</span>
                        </button>

                        <!-- Cancel·lar -->
                        <a th:if="${!popup}" th:href="@{/materies-primeres/list}" class="btn btn-secondary">
                            Cancel·lar
                        </a>

                        <button th:if="${popup}" type="button" class="btn btn-secondary" onclick="window.close();">
                            Cancel·lar
                        </button>

                    </div>

                </form>

            </div>

        </section>

    </main>

</div>

<!----------------------- SCRIPT JS ----------------------->
<script th:src="@{/js/materiesPrimeres.js}"></script>

</body>
</html>
