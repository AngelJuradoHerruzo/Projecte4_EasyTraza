<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productes - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar('productes')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Administració</p>
                <h1 class="page-heading">Productes</h1>
                <p class="page-description">
                    Consulta i gestiona els productes registrats.
                </p>
            </div>

            <div class="page-top-actions">
                <a th:href="@{/productes/new}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i>
                    <span>Nou producte</span>
                </a>
            </div>
        </section>

        <!----------------------- CONTENIDOR ----------------------->
        <section class="content-card">

            <!----------------------- TOOLBAR I FILTRE ----------------------->
            <div class="content-toolbar">
                <div class="toolbar-block">
                    <h2 class="content-title">Catàleg de productes</h2>
                    <p class="content-subtitle">
                        Filtra els productes pel seu nom.
                    </p>
                </div>

                <form th:action="@{/productes/list}"
                      method="get"
                      style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;">

                    <div class="search-field">
                        <i class="bi bi-search"></i>
                        <input name="nomProducte"
                               type="text"
                               th:value="${nomProducte}"
                               placeholder="Filtrar per nom...">
                    </div>

                    <button type="submit" class="btn btn-primary" style="height:46px; padding:0 16px;">
                        <i class="bi bi-arrow-right"></i>
                    </button>

                    <a th:href="@{/productes/list}" class="btn btn-secondary" style="height:46px; padding:0 16px;">
                        <i class="bi bi-x-circle"></i>
                        <span>Neteja</span>
                    </a>
                </form>
            </div>

            <!----------------------- TARGETES DE PRODUCTES ----------------------->
            <div class="cards-grid" id="productesContainer">

                <article th:each="producte : ${productes}" class="content-card producte-card">
                    <div style="padding: 20px;">

                        <!-- NOM -->
                        <h3 class="content-title"
                            th:text="${producte.nomProducte}">
                            Nom producte
                        </h3>

                        <!-- DESCRIPCIÓ -->
                        <p class="content-subtitle"
                           th:text="${producte.descripcio != null && !#strings.isEmpty(producte.descripcio) ? producte.descripcio : 'Sense descripció'}">
                            Descripció
                        </p>

                        <!----------------------- ACCIONS ----------------------->
                        <div class="info-card-actions">

                            <a th:href="@{/productes/edit/{id}(id=${producte.id})}" class="btn-table btn-soft">
                                <i class="bi bi-pencil-square"></i>
                                <span>Editar</span>
                            </a>

                            <a th:href="@{/productes/delete/{id}(id=${producte.id})}"
                               class="btn-table btn-delete"
                               onclick="return confirm('Segur que vols eliminar aquest producte?')">
                                <i class="bi bi-trash3"></i>
                                <span>Eliminar</span>
                            </a>

                        </div>
                    </div>
                </article>

                <!----------------------- ESTAT BUIT ----------------------->
                <div th:if="${#lists.isEmpty(productes)}" class="empty-state" style="grid-column: 1 / -1;">
                    <div class="empty-box" style="justify-content: center; width: 100%;">
                        <i class="bi bi-box-seam"></i>
                        <p>No hi ha productes que coincideixin amb els filtres.</p>
                    </div>
                </div>

            </div>

        </section>

    </main>

</div>

</body>
</html>
