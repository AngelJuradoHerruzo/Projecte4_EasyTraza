<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Llistar Usuaris</title>

    <style>
        body {
            background-color: #F2EDE4;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header {
            background-color: #59341E;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header img {
            height: 60px;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .btn {
            background-color: #E6A758;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #A66946;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }

        th {
            background-color: #88A66A;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .actions a {
            margin: 0 5px;
            color: #59341E;
            text-decoration: none;
            font-weight: bold;
        }

        .actions a:hover {
            color: #E6A758;
        }
    </style>
</head>

<body>

<header>
    <img src="/images/Logo_EasyTraza.png" alt="Logo EasyTraza">
    <h1>Llista d'Usuaris</h1>
</header>

<div class="container">

    <!-- BOTÓN CREAR -->
    <a th:href="@{/usuaris/new}" class="btn">+ Nou Usuari</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom complet</th>
                <th>Rol</th>
                <th>Email</th>
                <th>Accions</th>
            </tr>
        </thead>

        <tbody>
            <!-- LISTADO -->
            <tr th:each="usuari : ${usuaris}">
                <td th:text="${usuari.id}"></td>
                <td th:text="${usuari.nomComplet}"></td>
                <td th:text="${usuari.rolUsuari}"></td>
                <td th:text="${usuari.email}"></td>

                <td class="actions">
                    <a th:href="@{'/usuaris/edit/' + ${usuari.id}}">Editar</a>
                    <a th:href="@{'/usuaris/delete/' + ${usuari.id}}"
                       onclick="return confirm('Segur que vols eliminar aquest usuari?')">
                        Eliminar
                    </a>
                </td>
            </tr>

            <!-- SI NO HAY USUARIOS -->
            <tr th:if="${#lists.isEmpty(usuaris)}">
                <td colspan="5">No hi ha usuaris</td>
            </tr>

        </tbody>
    </table>

</div>

</body>
</html>
