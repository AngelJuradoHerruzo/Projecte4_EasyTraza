<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulari Producte - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar('productes')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Administració</p>

                <h1 class="page-heading"
                    th:text="${producte.id != null} ? 'Editar producte' : 'Nou producte'">
                    Formulari
                </h1>

                <p class="page-description">
                    Introdueix o modifica les dades del producte.
                </p>
            </div>

            <div class="page-top-actions">
                <a th:href="@{/productes/list}" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i>
                    <span>Tornar</span>
                </a>
            </div>
        </section>

        <!----------------------- CONTENIDOR DEL FORMULARI ----------------------->
        <section class="content-card">

            <!----------------------- TOOLBAR SUPERIOR ----------------------->
            <div class="content-toolbar">

                <div class="toolbar-block">
                    <h2 class="content-title">Dades del producte</h2>
                    <p class="content-subtitle">
                        Completa els camps següents.
                    </p>
                </div>

                <div th:if="${error}" class="form-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

            </div>

            <!----------------------- COS DEL FORMULARI ----------------------->
            <div style="padding: 20px 24px;">

                <form id="producteForm"
                      th:action="${producte.id != null} ? @{/productes/update/{id}(id=${producte.id})} : @{/productes/save}"
                      th:object="${producte}"
                      method="post">

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;">

                        <!----------------------- NOM PRODUCTE ----------------------->
                        <div class="form-group">
                            <label class="form-label" for="nomProducte">Nom producte</label>
                            <input id="nomProducte"
                                   type="text"
                                   th:field="*{nomProducte}"
                                   class="form-input"
                                   required
                                   title="Introdueix el nom del producte">
                        </div>

                        <!----------------------- DESCRIPCIÓ ----------------------->
                        <div class="form-group">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <label class="form-label" for="descripcio">Descripció</label>
                                <span id="descripcioCounter" style="font-size:13px;">0/50</span>
                            </div>

                            <input id="descripcio"
                                   type="text"
                                   th:field="*{descripcio}"
                                   class="form-input"
                                   title="La descripció és vàlida entre 0 i 50 caràcters, amb un màxim d'entrada de 100">
                        </div>

                    </div>

                    <!----------------------- BOTONS D'ACCIÓ ----------------------->
                    <div style="margin-top:25px; display:flex; gap:10px;">

                        <button type="submit" class="btn btn-soft">
                            <i class="bi bi-save"></i>
                            <span>Guardar</span>
                        </button>

                        <a th:href="@{/productes/list}" class="btn btn-secondary">
                            Cancel·lar
                        </a>

                    </div>

                </form>

            </div>

        </section>

    </main>

</div>

<!----------------------- SCRIPT JS ----------------------->
<script th:src="@{/js/productes.js}"></script>

</body>
</html>
