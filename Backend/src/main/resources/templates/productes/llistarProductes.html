<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productes - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar('productes')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Administració</p>
                <h1 class="page-heading">Productes</h1>
                <p class="page-description">
                    Consulta i gestiona els productes registrats.
                </p>
            </div>

            <div class="page-top-actions">
                <a th:href="@{/productes/new}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i>
                    <span>Nou producte</span>
                </a>
            </div>
        </section>

        <!----------------------- CONTENIDOR ----------------------->
        <section class="content-card">

            <!----------------------- TOOLBAR ----------------------->
            <div class="content-toolbar">
                <div class="toolbar-block">
                    <h2 class="content-title">Catàleg de productes</h2>
                    <p class="content-subtitle">
                        Consulta ràpida dels productes disponibles.
                    </p>
                </div>

                <div class="toolbar-actions">
                    <div class="search-field">
                        <i class="bi bi-search"></i>
                        <input id="searchInput" type="text" placeholder="Cercar producte...">
                    </div>
                </div>
            </div>

            <!----------------------- TARGETES ----------------------->
            <div class="cards-grid" id="productesContainer">

                <article th:each="producte : ${productes}" class="content-card producte-card">
                    <div style="padding: 20px;">

                        <!-- NOM -->
                        <h3 class="content-title"
                            th:text="${producte.nomProducte}">
                            Nom producte
                        </h3>

                        <!-- DESCRIPCIÓ -->
                        <p class="content-subtitle"
                        th:text="${producte.descripcio != null && !#strings.isEmpty(producte.descripcio) ? producte.descripcio : 'Sense descripció'}">
                            Descripció
                        </p>

                        <!-- ACCIONS -->
                        <div class="info-card-actions">

                            <a th:href="@{/productes/edit/{id}(id=${producte.id})}" class="btn-table btn-soft">
                                <i class="bi bi-pencil-square"></i>
                                <span>Editar</span>
                            </a>

                            <a th:href="@{/productes/delete/{id}(id=${producte.id})}"
                            class="btn-table btn-delete"
                            onclick="return confirm('Segur que vols eliminar aquest producte?')">
                                <i class="bi bi-trash3"></i>
                                <span>Eliminar</span>
                            </a>

                        </div>
                    </div>
                </article>

                <!----------------------- ESTAT BUIT ----------------------->
                <div th:if="${#lists.isEmpty(productes)}" class="empty-state">
                    <div class="empty-box" style="justify-content: center; width: 100%;">
                        <i class="bi bi-box-seam"></i>
                        <p>No hi ha productes registrats.</p>
                    </div>
                </div>

            </div>

        </section>

    </main>

</div>

<!----------------------- SCRIPT CERCA ----------------------->
<script>
    const searchInput = document.getElementById('searchInput');
    const cards = document.querySelectorAll('.producte-card');

    searchInput.addEventListener('keyup', function () {
        const filter = this.value.toLowerCase();

        cards.forEach(card => {
            const text = card.textContent.toLowerCase();
            card.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>

</body>
</html>
