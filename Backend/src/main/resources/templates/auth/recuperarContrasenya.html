<!DOCTYPE html>
<html lang="ca" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title th:text="#{recuperacio.titol}">Recuperar contrasenya - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/general.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px;">

    <section class="content-card" style="width:100%; max-width:460px;">

        <!----------------------- CAPÇALERA ----------------------->
        <div class="content-toolbar" style="justify-content:center; text-align:center;">

            <div class="toolbar-block">

                <div style="display:flex; justify-content:center; margin-bottom:16px;">
                    <div class="sidebar-logo-box" style="width:86px; height:86px;">
                        <img th:src="@{/img/Logo_EasyTraza.jpg}"
                             alt="Logo EasyTraza"
                             th:alt="#{comu.logo.alt}"
                             class="sidebar-logo">
                    </div>
                </div>

                <h1 class="page-heading">EasyTraza</h1>

                <p class="content-subtitle" th:text="#{recuperacio.subtitol}">
                    Indica el teu correu electrònic per rebre l'enllaç de recuperació.
                </p>

                <div class="language-switch login-language-switch" aria-label="Idioma">
                    <a th:href="@{/recuperar-contrasenya(lang='ca')}"
                       class="language-link"
                       th:classappend="${#locale.language == 'ca'} ? ' active' : ''"
                       th:text="#{idioma.catala}">Cat</a>

                    <a th:href="@{/recuperar-contrasenya(lang='es')}"
                       class="language-link"
                       th:classappend="${#locale.language == 'es'} ? ' active' : ''"
                       th:text="#{idioma.castella}">Es</a>
                </div>
            </div>
        </div>

        <!----------------------- FORMULARI ----------------------->
        <div style="padding:24px;">

            <div th:if="${success}" class="form-success" style="width:100%; margin-bottom:18px;">
                <i class="bi bi-check-circle"></i>
                <span th:text="${success}">Si el correu indicat està registrat, rebràs un enllaç.</span>
            </div>

            <form th:action="@{/recuperar-contrasenya}" method="post">

                <div class="form-group" style="margin-bottom:22px;">
                    <label class="form-label" for="email" th:text="#{recuperacio.email.etiqueta}">Correu electrònic</label>

                    <input id="email"
                           name="email"
                           type="email"
                           class="form-input"
                           autocomplete="email"
                           required
                           placeholder="usuari@exemple.com"
                           th:placeholder="#{recuperacio.email.placeholder}">
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;">
                    <i class="bi bi-envelope"></i>
                    <span th:text="#{recuperacio.enviar}">Enviar enllaç de recuperació</span>
                </button>

                <div style="margin-top:14px;">
                    <a th:href="@{/login}" class="btn btn-secondary" style="width:100%;">
                        <i class="bi bi-arrow-left"></i>
                        <span th:text="#{recuperacio.tornarLogin}">Tornar a iniciar sessió</span>
                    </a>
                </div>

            </form>
        </div>

    </section>

</div>

</body>
</html>
