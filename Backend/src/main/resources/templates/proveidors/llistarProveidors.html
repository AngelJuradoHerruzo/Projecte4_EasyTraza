<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Proveïdors - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar('proveidors')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Administració</p>
                <h1 class="page-heading">Proveïdors</h1>
                <p class="page-description">
                    Consulta i gestiona els proveïdors registrats al sistema.
                </p>
            </div>

            <div class="page-top-actions">
                <a th:href="@{/proveidors/new}" class="btn btn-primary">
                    <i class="bi bi-plus-lg"></i>
                    <span>Nou proveïdor</span>
                </a>
            </div>
        </section>

        <!----------------------- CONTENIDOR PRINCIPAL ----------------------->
        <section class="content-card">

            <!----------------------- TOOLBAR ----------------------->
            <div class="content-toolbar">
                <div class="toolbar-block">
                    <h2 class="content-title">Llistat de proveïdors</h2>
                    <p class="content-subtitle">
                        Filtra per nom o CIF / DNI.
                    </p>
                </div>

                <form th:action="@{/proveidors/list}"
                      method="get"
                      style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;">

                    <div class="search-field" style="width:260px;">
                        <i class="bi bi-building"></i>
                        <input name="nomProveidor" type="text" th:value="${nomProveidor}" placeholder="Nom proveïdor...">
                    </div>

                    <div class="search-field" style="width:220px;">
                        <i class="bi bi-upc-scan"></i>
                        <input name="cif" type="text" th:value="${cif}" placeholder="CIF / DNI...">
                    </div>

                    <button type="submit" class="btn btn-primary" style="height:46px; padding:0 16px;">
                        <i class="bi bi-arrow-right"></i>
                    </button>

                    <a th:href="@{/proveidors/list}" class="btn btn-secondary" style="height:46px; padding:0 16px;">
                        <i class="bi bi-x-circle"></i>
                        <span>Neteja</span>
                    </a>
                </form>
            </div>

            <!----------------------- TARGETES ----------------------->
            <div class="cards-grid" id="proveidorsContainer">

                <article th:each="proveidor : ${proveidors}" class="info-card proveidor-card">

                    <!----------------------- CAPÇALERA TARGETA ----------------------->
                    <div class="info-card-header">
                        <div class="info-card-icon">
                            <i class="bi bi-truck"></i>
                        </div>

                        <div class="info-card-body">
                            <h3 class="info-card-title proveidor-name" th:text="${proveidor.nomProveidor}">Nom proveïdor</h3>
                            <p class="info-card-description"
                               th:text="${proveidor.descripcio != null && !#strings.isEmpty(proveidor.descripcio) ? proveidor.descripcio : 'Sense descripció'}">
                                Descripció
                            </p>
                        </div>
                    </div>

                    <!----------------------- DADES DEL PROVEÏDOR ----------------------->
                    <div class="info-card-meta">

                        <div class="info-card-meta-item">
                            <i class="bi bi-upc-scan"></i>
                            <div class="info-card-meta-text">
                                <span class="info-card-meta-label">CIF / DNI</span>
                                <span class="info-card-meta-value proveidor-cif" th:text="${proveidor.cif}">CIF</span>
                            </div>
                        </div>

                        <div class="info-card-meta-item">
                            <i class="bi bi-geo-alt"></i>
                            <div class="info-card-meta-text">
                                <span class="info-card-meta-label">Adreça</span>
                                <span class="info-card-meta-value"
                                      th:text="${proveidor.adreca != null && !#strings.isEmpty(proveidor.adreca) ? proveidor.adreca : 'Sense adreça'}">
                                    Adreça
                                </span>
                            </div>
                        </div>

                    </div>

                    <!----------------------- ACCIONS ----------------------->
                    <div class="info-card-actions">
                        <a th:href="@{/proveidors/edit/{id}(id=${proveidor.id})}" class="btn-table btn-soft">
                            <i class="bi bi-pencil-square"></i>
                            <span>Editar</span>
                        </a>

                        <a th:href="@{/proveidors/delete/{id}(id=${proveidor.id})}"
                           class="btn-table btn-delete"
                           onclick="return confirm('Segur que vols eliminar aquest proveïdor?')">
                            <i class="bi bi-trash3"></i>
                            <span>Eliminar</span>
                        </a>
                    </div>

                </article>

                <!----------------------- ESTAT BUIT ----------------------->
                <div th:if="${#lists.isEmpty(proveidors)}" class="empty-state" style="grid-column: 1 / -1;">
                    <div class="empty-box">
                        <i class="bi bi-truck"></i>
                        <p>No hi ha proveïdors que coincideixin amb els filtres.</p>
                    </div>
                </div>

            </div>

        </section>

    </main>

</div>


</body>
</html>
