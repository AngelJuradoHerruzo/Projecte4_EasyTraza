<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lots - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <div th:replace="~{layout/sidebar :: sidebar('lots')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Traçabilitat</p>
                <h1 class="page-heading">Lots</h1>
                <p class="page-description">
                    Consulta els lots registrats i actualitza el seu estat.
                </p>
            </div>
        </section>

        <!----------------------- CONTENIDOR ----------------------->
        <section class="content-card">

            <!----------------------- TOOLBAR ----------------------->
            <div class="content-toolbar">
                <div class="toolbar-block">
                    <h2 class="content-title">Gestió de lots</h2>
                    <p class="content-subtitle">
                        Els lots es creen des dels albarans de proveïdor.
                    </p>
                </div>

                <div class="toolbar-actions">
                    <div class="search-field">
                        <i class="bi bi-search"></i>
                        <input id="searchInput" type="text" placeholder="Cercar lot...">
                    </div>
                </div>
            </div>

            <!----------------------- TAULA ----------------------->
            <div class="table-container">
                <table class="data-table" id="lotsTable" style="width:100%; table-layout:fixed;">

                    <colgroup>
                        <col style="width:70px;">
                        <col style="width:190px;">
                        <col style="width:260px;">
                        <col style="width:120px;">
                        <col style="width:140px;">
                        <col style="width:90px;">
                        <col style="width:260px;">
                    </colgroup>

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Lot</th>
                        <th>Matèria primera</th>
                        <th style="text-align:center;">Quantitat</th>
                        <th style="text-align:center;">Estat</th>
                        <th style="text-align:center;">Albarà</th>
                        <th style="text-align:center;">Accions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="lot : ${lots}">

                        <td class="td-id" th:text="${lot.id}">1</td>

                        <td class="user-name"
                            th:text="${lot.identificadorLot}"
                            style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            LOT-001
                        </td>

                        <td th:text="${lot.materiaPrimera.nomMateria}"
                            style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            Farina
                        </td>

                        <td th:text="${lot.quantitat}" style="text-align:center;">
                            10
                        </td>

                        <td th:text="${lot.estat}" style="text-align:center;">
                            EN_ESTOC
                        </td>

                        <td th:text="${lot.albaraProveidor.id}" style="text-align:center;">
                            1
                        </td>

                        <td>
                            <form th:action="@{/lots/estat/{id}(id=${lot.id})}"
                                method="post"
                                style="display:flex; justify-content:center; align-items:center; gap:8px;">

                                <select name="estat"
                                        class="form-input"
                                        required
                                        style="width:125px; height:38px; padding:0 10px;">
                                    <option th:each="estat : ${estats}"
                                            th:value="${estat}"
                                            th:text="${estat}"
                                            th:selected="${estat == lot.estat}">
                                    </option>
                                </select>

                                <button type="submit"
                                        class="btn btn-soft"
                                        style="height:38px; padding:0 14px; white-space:nowrap;">
                                    <i class="bi bi-save"></i>
                                    <span>Guardar</span>
                                </button>

                            </form>
                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(lots)}">
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="bi bi-box-seam"></i>
                                <p>No hi ha lots registrats.</p>
                            </div>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </section>

    </main>

</div>

<!----------------------- SCRIPT CERCA ----------------------->
<script>
    const searchInput = document.getElementById('searchInput');
    const table = document.getElementById('lotsTable');
    const rows = table.querySelectorAll('tbody tr');

    searchInput.addEventListener('keyup', function () {
        const filter = this.value.toLowerCase();

        rows.forEach(row => {
            if (row.querySelector('.empty-state')) return;

            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>

</body>
</html>
