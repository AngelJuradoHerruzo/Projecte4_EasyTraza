<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pàgina no trobada - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f7efe6; padding:24px;">

    <section style="width:100%; max-width:520px; background:#ffffff; border:1px solid #ead8c4; border-radius:26px; padding:34px 32px; box-shadow:0 18px 40px rgba(90, 54, 28, 0.12); text-align:center;">

        <div style="width:72px; height:72px; margin:0 auto 22px auto; border-radius:24px; display:flex; align-items:center; justify-content:center; background:#fff1df; color:#8B5E34; font-size:34px;">
            <i class="bi bi-search"></i>
        </div>

        <p class="page-eyebrow" style="margin-bottom:8px;">
            Error 404
        </p>

        <h1 class="page-heading" style="margin-bottom:12px;">
            Pàgina no trobada
        </h1>

        <p class="page-description" style="margin:0 auto 24px auto; max-width:390px;">
            La pàgina que estàs intentant obrir no existeix o ja no està disponible.
        </p>

        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">

            <a th:href="@{/productes/list}" class="btn btn-primary">
                <i class="bi bi-house-door"></i>
                <span>Tornar a l'inici</span>
            </a>

            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="bi bi-arrow-left-circle"></i>
                <span>Tornar enrere</span>
            </a>

        </div>

    </section>

</div>

</body>
</html>
