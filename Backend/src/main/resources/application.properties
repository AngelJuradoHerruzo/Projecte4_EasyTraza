spring.application.name=easytraza

# ---------------------- BASE DE DADES ----------------------
spring.datasource.url=jdbc:mysql://localhost:3306/easytraza
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --------------------- JPA / HIBERNATE ---------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --------------------------- OCR ---------------------------
ocr.tessdata.path=C:/Program Files/Tesseract-OCR/tessdata
ocr.tesseract.language=spa
ocr.documents.temp-path=backend/uploads/ocr-temp
ocr.documents.final-path=backend/uploads/albarans-proveidor

# ------------------------- UPLOADS -------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------- LOGS ---------------------------
logging.file.path=Backend/logs
logging.level.root=INFO
logging.level.cat.copernic.easytraza=INFO

# -------------------------- HTTPS --------------------------
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore/easytraza.p12
server.ssl.key-store-password=easytraza123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=easytraza
server.ssl.protocol=TLS