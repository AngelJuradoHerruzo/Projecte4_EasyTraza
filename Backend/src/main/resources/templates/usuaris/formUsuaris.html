<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulari Usuari - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <div th:replace="layout/sidebar :: sidebar('usuaris')"></div>

    <main class="main">

        <!-- CABECERA -->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Administració</p>

                <h1 class="page-heading"
                    th:text="${usuari.id != null} ? 'Editar usuari' : 'Nou usuari'">
                    Formulari
                </h1>

                <p class="page-description">
                    Introdueix o modifica les dades de l'usuari.
                </p>
            </div>

            <div class="page-top-actions">
                <a th:href="@{/usuaris/list}" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i>
                    <span>Tornar</span>
                </a>
            </div>
        </section>

        <!-- FORM -->
        <section class="content-card">

            <div class="content-toolbar">
                <div class="toolbar-block">
                    <h2 class="content-title">Dades de l'usuari</h2>
                    <p class="content-subtitle">
                        Completa els camps següents.
                    </p>
                </div>
            </div>

            <div style="padding: 20px 24px;">

                <form th:action="${usuari.id != null} ? 
                                @{/usuaris/update/{id}(id=${usuari.id})} : 
                                @{/usuaris}"
                      th:object="${usuari}"
                      method="post">

                    <!-- GRID -->
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">

                        <!-- NOM -->
                        <div class="form-group">
                            <label class="form-label">Nom complet</label>
                            <input type="text" th:field="*{nomComplet}" class="form-input" required>
                        </div>

                        <!-- EMAIL -->
                        <div class="form-group">
                            <label class="form-label">Correu electrònic</label>
                            <input type="email" th:field="*{email}" class="form-input" required>
                        </div>

                        <!-- ROL -->
                        <div class="form-group">
                            <label class="form-label">Rol</label>
                            <select th:field="*{rolUsuari}" class="form-select" required>
                                <option value="">-- Selecciona rol --</option>
                                <option value="ADMIN">ADMIN</option>
                                <option value="OPERARI">OPERARI</option>
                            </select>
                        </div>

                        <!-- PASSWORD -->
                        <div class="form-group">
                            <label class="form-label">Contrasenya</label>
                            <input type="password"
                                th:field="*{password}"
                                class="form-input"
                                placeholder="Deixar en blanc per no modificar">
                        </div>

                    </div>

                    <!-- BOTONES -->
                    <div style="margin-top:25px; display:flex; gap:10px;">

                        <button type="submit"
                                class="btn btn-soft">
                            <i class="bi bi-save"></i>
                            <span>Guardar</span>
                        </button>

                        <a th:href="@{/usuaris/list}" class="btn btn-secondary">
                            Cancel·lar
                        </a>

                    </div>

                </form>

            </div>

        </section>

    </main>

</div>

</body>
</html>
