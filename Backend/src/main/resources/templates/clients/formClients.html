<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulari Client - EasyTraza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar('clients')}"></div>

    <main class="main">

        <!----------------------- CAPÇALERA ----------------------->
        <section class="page-top">
            <div class="page-top-left">
                <p class="page-eyebrow">Administració</p>

                <h1 class="page-heading"
                    th:text="${client.id != null} ? 'Editar client' : 'Nou client'">
                    Formulari
                </h1>

                <p class="page-description">
                    Introdueix o modifica les dades del client.
                </p>
            </div>

            <div class="page-top-actions">
                <a th:href="@{/clients/list}" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i>
                    <span>Tornar</span>
                </a>
            </div>
        </section>

        <!----------------------- CONTENIDOR DEL FORMULARI ----------------------->
        <section class="content-card">

            <!----------------------- TOOLBAR SUPERIOR ----------------------->
            <div class="content-toolbar">

                <div class="toolbar-block">
                    <h2 class="content-title">Dades del client</h2>
                    <p class="content-subtitle">
                        Completa els camps següents.
                    </p>
                </div>

                <div th:if="${error}" class="form-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

            </div>

            <!----------------------- COS DEL FORMULARI ----------------------->
            <div style="padding: 20px 24px;">

                <form id="clientForm"
                      th:action="${client.id != null} ? @{/clients/update/{id}(id=${client.id})} : @{/clients/save}"
                      th:object="${client}"
                      method="post">

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;">

                        <!----------------------- CIF / DNI ----------------------->
                        <div class="form-group">
                            <label class="form-label" for="cif">CIF / DNI</label>
                            <input id="cif"
                                   type="text"
                                   th:field="*{cif}"
                                   class="form-input"
                                   required
                                   maxlength="9"
                                   pattern="(^[0-9]{8}[A-Za-z]$)|(^[A-Za-z][0-9]{7}[A-Za-z0-9]$)"
                                   title="Introdueix un DNI (12345678Z) o un CIF (A1234567B) vàlid">
                        </div>

                        <!----------------------- NOM COMPLET ----------------------->
                        <div class="form-group">
                            <label class="form-label" for="nomComplet">Nom complet</label>
                            <input id="nomComplet"
                                   type="text"
                                   th:field="*{nomComplet}"
                                   class="form-input"
                                   required
                                   pattern="^[A-Za-zÀ-ÿ]+(?:\s+[A-Za-zÀ-ÿ]+)+$"
                                   title="Introdueix nom i cognoms, només amb lletres">
                        </div>

                        <!----------------------- TELÈFON ----------------------->
                        <div class="form-group">
                            <label class="form-label" for="telefon">Telèfon</label>
                            <input id="telefon"
                                   type="text"
                                   th:field="*{telefon}"
                                   class="form-input"
                                   required
                                   maxlength="12"
                                   pattern="^[0-9]{3}\s[0-9]{2}\s[0-9]{2}\s[0-9]{2}$"
                                   title="El telèfon ha de tenir el format XXX XX XX XX">
                        </div>

                        <!----------------------- EMAIL ----------------------->
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <input id="email"
                                   type="email"
                                   th:field="*{email}"
                                   class="form-input"
                                   pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"
                                   title="Introdueix un correu electrònic vàlid, per exemple.exemple@gmail.com">
                        </div>

                        <!----------------------- ADREÇA ----------------------->
                        <div class="form-group">
                            <label class="form-label" for="adreca">Adreça</label>
                            <input id="adreca"
                                   type="text"
                                   th:field="*{adreca}"
                                   class="form-input"
                                   required
                                   title="Introdueix l'adreça del client">
                        </div>

                        <!----------------------- OBSERVACIONS ----------------------->
                        <div class="form-group">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <label class="form-label" for="observacions">Observacions</label>
                                <span id="observacionsCounter" style="font-size:13px;">0/50</span>
                            </div>

                            <input id="observacions"
                                   type="text"
                                   th:field="*{observacions}"
                                   class="form-input"
                                   maxlength="100"
                                   title="Les observacions són vàlides entre 0 i 50 caràcters, amb un màxim d'entrada de 100">
                        </div>

                    </div>

                    <!----------------------- BOTONS D'ACCIÓ ----------------------->
                    <div style="margin-top:25px; display:flex; gap:10px;">

                        <button type="submit" class="btn btn-soft">
                            <i class="bi bi-save"></i>
                            <span>Guardar</span>
                        </button>

                        <a th:href="@{/clients/list}" class="btn btn-secondary">
                            Cancel·lar
                        </a>

                    </div>

                </form>

            </div>

        </section>

    </main>

</div>

<!----------------------- SCRIPT JS ----------------------->
<script th:src="@{/js/clients.js}"></script>

</body>
</html>
